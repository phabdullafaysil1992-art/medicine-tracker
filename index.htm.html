  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #ec3013;\n  --color-accent-2: #e15b47;\n  --color-divider: color-mix(in srgb, #201e1d 40%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #fff2ef;\n  --color-accent-200: #ffe0d9;\n  --color-accent-300: #ffc4b8;\n  --color-accent-400: #ff9783;\n  --color-accent-500: #ff563c;\n  --color-accent-600: #dd2b0f;\n  --color-accent-700: #ae1800;\n  --color-accent-800: #7c1405;\n  --color-accent-900: #4d170e;\n\n  --color-accent-2-100: #fff2ef;\n  --color-accent-2-200: #ffe0da;\n  --color-accent-2-300: #ffc4b9;\n  --color-accent-2-400: #ff9784;\n  --color-accent-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — t:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle><style>\nbody{direction:rtl}\n.app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--color-bg);display:flex;flex-direction:column;position:relative}\n.topnav{display:flex;align-items:center;gap:8px;padding:var(--space-3) var(--space-4);border-bottom:2px solid var(--color-divider);position:sticky;top:0;background:var(--color-bg);z-index:5}\n.brand{font-family:var(--font-heading);font-weight:800;font-size:17px;flex:1}\n.iconbtn{width:36px;height:36px;flex:none;display:flex;align-items:center;justify-content:center;border:1px solid var(--color-divider);background:transparent;cursor:pointer;color:var(--color-text);border-radius:var(--radius-md);position:relative}\n.iconbtn:hover{background:color-mix(in srgb, var(--color-text) 7%, transparent)}\n.latebanner{display:flex;align-items:center;gap:8px;background:var(--color-accent);color:var(--color-bg);padding:10px var(--space-4);font-weight:700;font-size:13px}\n.filters{padding:var(--space-3) var(--space-4);display:flex;flex-direction:column;gap:8px;border-bottom:2px solid var(--color-divider)}\n.filtrow{display:flex;gap:8px;flex-wrap:wrap}\n.filtrow>*{flex:1;min-width:110px}\n.seg{width:100%}\n.seg .seg-opt{flex:1;justify-content:center}\n.list{padding:var(--space-3) var(--space-4);display:flex;flex-direction:column;gap:12px;flex:1}\n.ordercard{cursor:pointer;border:1px solid var(--color-divider)}\n.ordercard:hover{box-shadow:var(--shadow-sm)}\n.cardtop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}\n.cardmeta{font-size:12px;colo isplay:flex;flex-direction:column;gap:6px}\n.imgfield label{font-size:12px;color:color-mix(in srgb, var(--color-text) 70%, transparent)}\n.imgslotwrap{width:100%;height:110px;position:relative}\n.slotbadge{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);color:var(--color-accent);pointer-events:none;z-index:2}\n.thumb .slotbadge{width:16px;height:16px;top:2px;right:2px}\n.thumb .slotbadge svg{width:9px;height:9px}\n.dangerzone{border-top:2px solid var(--color-divider);padding-top:16px;display:flex;flex-direction:column;gap:8px}\n.confirmbar{display:flex;gap:8px;align-items:center;font-size:13px;flex-wrap:wrap}\n.hidden-file{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden}\n.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--color-neutral-900);color:#fff;padding:10px 18px;font-size:13px;z-index:50}\n:root{--color-bg:#f2f6fc;--color-surface:#e8f0fb;--color-accent:#2f6fce;--color-accent-100:#eaf1fb;--color-accent-200:#cfe0f7;--color-accent-300:#a8c8ef;--color-accent-400:#6fa3e0;--color-accent-500:#2f6fce;--color-accent-600:#1f57ac;--color-accent-700:#164486;--color-accent-800:#0f3465;--color-accent-900:#0a2549;--color-accent-2:#229c5b;--color-accent-2-100:#e7f7ee;--color-accent-2-200:#c8ecd7;--color-accent-2-300:#9ddcb8;--color-accent-2-400:#5cc189;--color-accent-2-500:#229c5b;--color-accent-2-600:#187f48;--color-accent-2-700:#126537;--color-accent-2-800:#0d4d29;--color-accent-2-900:#08361c;--color-late:#c8371d;--color-late-100:#fdeeea;--color-late-800:#7c1405}\n.brandmark{width:30px;height:35px;flex:none}\n.tag-late{background:var(--color-late-100);color:var(--color-late-800)}\n.latebanner{background:var(--color-late)!important}\n.late-txt{color:var(--color-late)!important}\n<\u002Fstyle><\u002Fhelmet><div class=\"app\">\n<div class=\"topnav\">\n<svg class=\"brandmark\" sc-camel-view-box=\"0 tState({ activeId: id, editingOrder: false, editDraft: null, showAddReceipt: false, confirmDelete: false });\n  }\n  backToList = () => this.setState({ activeId: null });\n\n  toggleEdit = () => {\n    if (this.state.editingOrder) { this.setState({ editingOrder: false }); return; }\n    const o = this.state.orders.find(x => x.id === this.state.activeId);\n    this.setState({ editingOrder: true, editDraft: { item: o.item, rep: o.rep, warehouse: o.warehouse, qty: String(o.qtyOrdered), bonus: String(o.bonusAgreed), orderDate: o.orderDate, lateDays: String(o.lateDays) } });\n  };\n  cancelEdit = () => this.setState({ editingOrder: false });\n  setEditItem = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, item: e.target.value } }));\n  setEditRep = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, rep: e.target.value } }));\n  setEditWarehouse = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, warehouse: e.target.value } }));\n  setEditQty = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, qty: e.target.value } }));\n  setEditBonus = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, bonus: e.target.value } }));\n  setEditDate = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, orderDate: e.target.value } }));\n  setEditLateDays = (e) => this.setState(s => ({ editDraft: { ...s.editDraft, lateDays: e.target.value } }));\n\n  saveEdit = () => {\n    const d = this.state.editDraft, id = this.state.activeId;\n    if (!d.item || !d.rep || !d.warehouse || !d.qty) return;\n    this.updateOrders(orders => orders.map(o => o.id === id ? { ...o, item: d.item, rep: d.rep, warehouse: d.warehouse, qtyOrdered: Number(d.qty), bonusAgreed: Number(d.bonus || 0), orderDate: d.orderDate, lateDays: Number(d.lateDays || 3) } : o), 'تم حفظ التعديل');\n    this.setState({ editingOrder: false });\n  };\n\n  openAddReceipt = () => {\n    const rid = this.uid();\n    this.setState({ showAddReceipt: true, receiptDraft: { id: rid, qty: '', bonus: '', date: this.todayISO(), invId: rid + '-inv', listId: rid + '-list' } });\n  };\n  cancelAddReceipt = () => this.setState({ showAddReceipt: false });\n  setReceiptQty = (e) => this.setState(s => ({ receiptDraft: { ...s.receiptDraft, qty: e.target.value } }));\n  setReceiptBonus = (e) => this.setState(s => ({ receiptDraft: { ...s.receiptDraft, bonus: e.target.value } }));\n  setReceiptDate = (e) => this.setState(s => ({ receiptDraft: { ...s.receiptDraft, date: e.target.value } }));\n\n  saveReceipt = () => {\n    const d = this.state.receiptDraft, id = this.state.activeId;\n    if (d.qty === '' && d.bonus === '') return;\n    const receipt = { id: d.id, qty: Number(d.qty || 0), bonus: Number(d.bonus || 0), date: d.date };\n    this.updateOrders(orders => orders.map(o => o.id === id ? { ...o, receipts: [...o.receipts, receipt] } : o), 'تم تسجيل الاستلام');\n    this.setState({ showAddReceipt: false });\n  };\n\n  requestDelete = () => this.setState({ confirmDelete: true });\n  cancelDelete = () => this.setState({ confirmDelete: false });\n  confirmDeleteYes = () => {\n    const id = this.state.activeId;\n    this.updateOrders(orders => orders.filter(o => o.id !== id), 'تم حذف الطلبية');\n    this.setState({ activeId: null, confirmDelete: false });\n  };\n\n  deleteReceipt(orderId, receiptId) {\n    this.updateOrders(orders => orders.map(o => o.id === orderId ? { ...o, receipts: o.receipts.filter(r => r.id !== receiptId) } : o), 'تم حذف عملية الاستلام');\n  }\n\n  csvEscape(v) {\n    const s = String(v == null ? '' : v);\n    return /[\",\\n]/.test(s) ? '\"' + s.replace(/\"/g, '\"\"') + '\"' : s;\n  }\n  parseCsvLine(line) {\n    const out = []; let cur = ''; let q = false;\n    for (let i = 0; i < line.length; i++) {\n      const c = line[i];\n      if (q) {\n        if (c === '\"') { if (line[i + 1] === '\"') { cur += '\"'; i++; } else q = false; }\n        else cur += c;\n      } else {\n        if (c === '\"') q = true;\n        else if (c === ',') { out.push(cur); [5] || 0), orderDate: c[6] || this.todayISO(), lateDays: Number(c[7] || 3), receipts: [] };\n        });\n        const byId = {}; orders.forEach(o => byId[o.id] = o);\n        receiptLines.forEach(l => {\n          const c = this.parseCsvLine(l);\n          const o = byId[c[0]];\n          if (o) o.receipts.push({ id: c[1] || this.uid(), qty: Number(c[2] || 0), bonus: Number(c[3] || 0), date: c[4] || this.todayISO() });\n        });\n        if (orders.length) {\n          this.updateOrders(() => orders, 'تم استيراد ' + orders.length + ' طلبية');\n        }\n      } catch (err) { this.flashToast('تعذر قراءة الملف'); }\n      e.target.value = '';\n    };\n    reader.readAsText(file);\n  };\n\n  renderVals() {\n    const s = this.state;\n    const allMeta = s.orders.map(o => ({ o, meta: this.computeMeta(o) }));\n    const lateCount = allMeta.filter(x => x.meta.isLate).length;\n\n    const reps = Array.from(new Set(s.orders.map(o => o.rep))).sort();\n    const warehouses = Array.from(new Set(s.orders.map(o => o.warehouse))).sort();\n    const repOptions = [{ value: 'all', label: 'كل المناديب' }, ...reps.map(r => ({ value: r, label: r }))];\n    const warehouseOptions = [{ value: 'all', label: 'كل المذاخر' }, ...warehouses.map(w => ({ value: w, label: w }))];\n\n    const statusDefs = [{ value: 'all', label: 'الكل' }, { value: 'pending', label: 'قيد الانتظار' }, { value: 'late', label: 'متأخرة' }, { value: 'complete', label: 'مكتملة' }];\n    const statusOptions = statusDefs.map(sd => ({ value: sd.value, label: sd.label, checked: s.filterStatus === sd.value, onSelect: () => this.setState({ filterStatus: sd.value }) }));\n\n    let list = allMeta.filter(({ o, meta }) => {\n      if (s.filterStatus !== 'all' && meta.status !== s.filterStatus) return false;\n      if (s.filterRep !== 'all' && o.rep !== s.filterRep) return false;\n      if (s.filterWarehouse !== 'all' && o.warehouse !== s.filterWarehouse) return false;\n      if (s.search && !(o.item.includes(s.search) || elete: this.requestDelete, cancelDelete: this.cancelDelete, confirmDeleteYes: this.confirmDeleteYes,\n      exportCsv: this.exportCsv, importCsv: this.importCsv,\n      toast: s.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
